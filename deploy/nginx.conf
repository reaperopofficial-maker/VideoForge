server {
    listen 80;
    listen [::]:80;
    server_name tumhara-domain.com www.tumhara-domain.com;

    # Redirect all HTTP requests to HTTPS (Uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    root /var/www/videoforge/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Allow large file uploads (for novel text/PDFs if needed)
    client_max_body_size 100M;

    # Serve Frontend (React/Vite)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Backend API (FastAPI)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Static Assets / Projects output (if configured to serve directly)
    location /projects/ {
        alias /var/www/videoforge/projects/;
        autoindex off;
        expires max;
        add_header Cache-Control public;
    }
}

